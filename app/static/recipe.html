<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe — KitchenKeep</title>
  <meta name="description" content="View recipe details, ingredients, and steps." />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="recipe">

  <!-- ---- Site Header ---- -->
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="site-header__logo" aria-label="KitchenKeep home">
        <span class="logo-icon" aria-hidden="true">🍳</span>
        KitchenKeep
      </a>
      <div class="site-header__actions">
        <a href="edit.html" class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          Add Recipe
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">

      <!-- Back link -->
      <a href="index.html" class="back-link" aria-label="Back to all recipes">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        All Recipes
      </a>

      <!-- Recipe hero (image + meta) -->
      <section class="recipe-hero">
        <!-- Image -->
        <div class="recipe-hero__image">
          <img id="hero-image" alt="" style="display:none;" loading="lazy" />
          <div id="hero-placeholder" class="recipe-hero__image-placeholder" aria-hidden="true">🍽</div>
        </div>

        <!-- Info -->
        <div class="recipe-hero__info">
          <h1 id="recipe-title" class="recipe-title">Loading…</h1>
          <p id="recipe-desc" class="recipe-description"></p>

          <!-- Meta bar -->
          <div class="recipe-meta-bar">
            <!-- Servings scaler -->
            <div class="recipe-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
              <div class="servings-scaler" role="group" aria-label="Adjust servings">
                <button id="servings-minus" class="scaler-btn" aria-label="Decrease servings">−</button>
                <span id="servings-display" aria-live="polite">1</span>
                <button id="servings-plus" class="scaler-btn" aria-label="Increase servings">+</button>
              </div>
              <span class="text-muted text-sm">servings</span>
            </div>

            <div class="recipe-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
              Prep <strong id="recipe-prep">—</strong>
            </div>

            <div class="recipe-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
              Cook <strong id="recipe-cook">—</strong>
            </div>
          </div>

          <!-- Tags -->
          <div id="recipe-tags" class="recipe-card__tags" aria-label="Tags"></div>

          <!-- Action buttons -->
          <div class="recipe-actions">
            <a id="edit-btn" href="#" class="btn btn-outline">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit
            </a>
            <button id="delete-btn" class="btn btn-danger">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              Delete
            </button>
          </div>

          <!-- Source link -->
          <div id="recipe-source" style="display:none;">
            <a id="source-link" href="#" class="source-link" target="_blank" rel="noopener noreferrer">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              Original recipe
            </a>
          </div>
        </div>
      </section>

      <!-- Recipe body: ingredients + steps -->
      <section class="recipe-body">

        <!-- Ingredients -->
        <div class="recipe-section">
          <h2>Ingredients</h2>
          <ul id="ingredient-list" class="ingredient-list" aria-label="Ingredients"></ul>
        </div>

        <!-- Steps + Notes -->
        <div>
          <div class="recipe-section">
            <h2>Instructions</h2>
            <ol id="steps-list" class="steps-list" aria-label="Recipe steps"></ol>
          </div>

          <div id="recipe-notes" class="recipe-section" style="display:none;margin-top:2rem;">
            <h2>Notes</h2>
            <div class="recipe-notes">
              <p id="recipe-notes-text"></p>
            </div>
          </div>
        </div>

      </section>

    </div>
  </main>

  <div id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
